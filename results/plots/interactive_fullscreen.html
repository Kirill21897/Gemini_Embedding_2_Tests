        body {

            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.3rem; }
        .controls { display: flex; gap: 0.5rem; }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #4338ca; }
        .btn-outline {
            background: transparent;
            border: 1px solid #4f46e5;
        }
        .btn-outline:hover { background: rgba(79, 70, 229, 0.2); }
        
        #plot-container {
            flex: 1;
            width: 100%;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #plot { 
            width: 100%; 
            height: 100%; 
            min-height: 600px;
        }
        
        .info-panel {
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.05);
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .info-panel code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        
        /* Полноэкранный режим */
        .fullscreen #plot-container { padding: 0; }
        .fullscreen header, .fullscreen .info-panel { display: none; }
        .fullscreen #plot { min-height: 100vh; }

                    e.preventDefault();
                    toggleFullscreen();
                }
            });
        }
        
        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen');
            if (plot) Plotly.Plots.resize(document.getElementById('plot'));
        }
        
        function resetView() {
            if (plot) {
                Plotly.relayout('plot', {
                    'scene.camera.eye': {x: 1.5, y: 1.5, z: 1.5},
                    'scene.camera.up': {x: 0, y: 0, z: 1}
                });
            }
        }
